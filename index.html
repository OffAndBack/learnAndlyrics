<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics & Learn PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b; --bg2: rgba(255, 255, 255, 0.03); --bg3: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08); --border-hover: rgba(255, 255, 255, 0.2);
      --text: #f8fafc; --text2: #94a3b8; --text3: #64748b;
      --accent-grad: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      --accent: #a855f7; --radius: 12px; --radius-lg: 20px;
    }
    body { background-color: var(--bg); background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.1), transparent 25%), radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.1), transparent 25%); background-attachment: fixed; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; position: relative;}
    
    /* Header & Navbar */
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    header { text-align: center; margin-bottom: 2rem; position: relative; }
    .logo { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 48px); font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; }
    .logo span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { font-size: 15px; color: var(--text2); }

    .glass-panel { background: var(--bg2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .btn { padding: 12px 20px; font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text); transition: 0.2s; display: inline-flex; justify-content: center; align-items: center; gap: 8px; }
    .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--border-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; background: var(--bg2); border-color: var(--border); }
    .btn-primary { background: var(--accent-grad); border: none; color: white; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
    .btn-primary:hover { background: linear-gradient(135deg, #4f46e5, #9333ea, #db2777); border: none; }
    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-xs { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; transition: 0.2s; }
    .btn-xs:hover { background: rgba(168, 85, 247, 0.3); }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; filter: grayscale(1); transition: 0.2s; padding: 4px; }
    .btn-icon:hover { filter: grayscale(0); transform: scale(1.1); }

    /* Inputs */
    input[type="text"], input[type="password"], select { flex: 1; padding: 12px 16px; font-size: 15px; font-family: 'Outfit', sans-serif; background: rgba(0,0,0,0.2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); outline: none; transition: 0.3s; }
    input:focus, select:focus { border-color: rgba(168, 85, 247, 0.5); background: rgba(0,0,0,0.4); }
    select option { background: var(--bg); color: var(--text); }
    .search-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .search-row > * { flex: 1 1 200px; }

    /* API Block & Status */
    .api-setup, .api-saved { padding: 1.5rem; margin-bottom: 1.5rem; }
    .api-setup h3 { font-size: 12px; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
    .api-saved { display: flex; align-items: center; justify-content: space-between; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px rgba(16,185,129,0.4);}
    .hint { font-size: 13px; color: var(--text3); text-align: center; }
    #status { text-align: center; padding: 2rem; color: var(--text2); font-weight: 500; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s infinite linear; vertical-align: middle; margin-right: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Song Info & Difficulty Badge */
    #songHeader { display: flex; align-items: center; gap: 20px; padding: 20px; margin-bottom: 2rem; border-radius: var(--radius-lg); background: linear-gradient(to right, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); }
    .song-icon { width: 64px; height: 64px; background: var(--bg3); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 10px rgba(255,255,255,0.05); }
    .song-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; display: flex; align-items: center; gap: 12px;}
    .song-meta { font-size: 15px; color: var(--accent); font-weight: 500; }
    .diff-badge { background: rgba(16, 185, 129, 0.15); color: #34d399; font-size: 12px; padding: 4px 10px; border-radius: 20px; font-family: 'Outfit'; border: 1px solid rgba(16, 185, 129, 0.2); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 2rem; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { padding: 12px 20px; font-size: 15px; font-weight: 500; font-family: 'Outfit', sans-serif; border: none; background: transparent; color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer; transition: 0.2s; margin-bottom: -1px; white-space: nowrap; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-panel { display: none; animation: fadeIn 0.4s; }
    .tab-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Lines */
    .mode-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding: 12px 20px; border-radius: var(--radius-lg); }
    .line-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; overflow: hidden; }
    .line-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .line-card.current { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .line-card.done { opacity: 0.7; }
    .line-card.done:hover { opacity: 1; }
    .line-en { padding: 16px 20px; display: flex; align-items: center; gap: 16px; font-size: 18px; font-weight: 500; color: var(--text); }
    .line-text { flex: 1; }
    .badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-align: center; }
    .badge-todo { background: rgba(255,255,255,0.1); color: var(--text2); }
    .badge-current { background: rgba(168, 85, 247, 0.2); color: #d8b4fe; }
    .badge-done { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .line-fr { display: none; border-top: 1px solid var(--border); padding: 14px 20px 16px; font-size: 16px; color: var(--text2); background: rgba(0,0,0,0.2); }
    .line-fr.visible { display: block; animation: slideDown 0.3s; }
    @keyframes slideDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
    .line-note { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: #a5b4fc; margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.1); }
    .deep-dive-box { margin-top: 12px; padding: 16px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--accent); font-size: 14px; color: var(--text); display: none; }
    .deep-dive-box.active { display: block; animation: fadeIn 0.3s; }

    /* Flashcards */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .flashcard { perspective: 1000px; height: 180px; cursor: pointer; }
    .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--bg2); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .flashcard-back { transform: rotateY(180deg); background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.3); }
    .fc-word { font-size: 22px; font-weight: 700; color: var(--text); }
    .fc-trans { font-size: 20px; font-weight: 600; color: #d8b4fe; margin-bottom: 8px; }
    .fc-ctx { font-size: 13px; color: var(--text2); font-style: italic; }

    /* Controls */
    .controls { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-top: 2rem; background: var(--bg2); padding: 16px 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    .progress-fill { height: 100%; background: var(--accent-grad); border-radius: 10px; transition: 0.3s; }
    
    /* Content blocks */
    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .content-box { padding: 20px; font-size: 16px; color: var(--text); background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; }

    /* Modal Historique */
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-content { width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
    .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
    .hist-item:hover { background: rgba(255,255,255,0.05); }

    .hidden { display: none !important; }
    #result { display: none; margin-top: 2rem; }
    #result.visible { display: block; animation: fadeIn 0.6s; }
  </style>
</head>
<body>
<div class="container">

  <div class="top-nav">
    <div class="logo" style="margin:0; font-size:24px;">Lyrics<span>&</span>Learn PRO</div>
    <button class="btn btn-sm" onclick="toggleHistory()">📖 Historique</button>
  </div>

  <header>
    <p class="tagline">Traduction, Synthèse Vocale, Grammaire Avancée & Flashcards</p>
  </header>

  <div id="apiBlock"></div>

  <div class="search-wrap glass-panel" style="padding: 1.5rem;">
    <div class="search-row">
      <input type="text" id="artistInput" placeholder="Artiste — ex: Eminem, BTS, Rosalía" />
      <input type="text" id="titleInput"  placeholder="Titre — ex: Lose Yourself" />
    </div>
    <div class="search-row">
      <select id="sourceLang">
        <option value="Anglais">Langue originale: 🇬🇧 Anglais</option>
        <option value="Espagnol">Langue originale: 🇪🇸 Espagnol</option>
        <option value="Coréen">Langue originale: 🇰🇷 Coréen</option>
        <option value="Japonais">Langue originale: 🇯🇵 Japonais</option>
        <option value="Italien">Langue originale: 🇮🇹 Italien</option>
        <option value="Allemand">Langue originale: 🇩🇪 Allemand</option>
      </select>
      <select id="targetLang">
        <option value="Français">Traduction en: 🇫🇷 Français</option>
        <option value="Anglais">Traduction en: 🇬🇧 Anglais</option>
        <option value="Espagnol">Traduction en: 🇪🇸 Espagnol</option>
      </select>
      <button class="btn btn-primary" id="searchBtn" onclick="run()">Analyser 🚀</button>
    </div>
  </div>

  <div id="status" class="hidden"></div>

  <div id="result">
    <div id="songHeader">
      <div class="song-icon">✨</div>
      <div style="flex:1">
        <div class="song-title" id="stitle">Titre <span id="sdiff" class="diff-badge">A2</span></div>
        <div class="song-meta" id="sartist">Artiste</div>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('learn',this)">Apprentissage</button>
      <button class="tab-btn" onclick="switchTab('vocab',this)">Vocabulaire (Flashcards)</button>
      <button class="tab-btn" onclick="switchTab('context',this)">Contexte</button>
      <button class="tab-btn" onclick="switchTab('anecdotes',this)">Anecdotes</button>
    </div>
    
    <div class="tab-panel active" id="tab-learn">
      <div class="mode-row glass-panel">
        <span>Révéler toutes les traductions</span>
        <label class="toggle" style="position:relative; width:44px; height:24px; cursor:pointer;">
          <input type="checkbox" id="showAllToggle" onchange="toggleShowAll()" style="opacity:0; width:0;" />
          <span style="position:absolute; inset:0; background:rgba(255,255,255,0.1); border-radius:24px; transition:0.3s;" id="trackBg"></span>
          <span style="position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.3s;" id="trackThumb"></span>
        </label>
      </div>
      <div id="lyricsContainer"></div>
      
      <div class="controls glass-panel">
        <button class="btn" id="prevBtn" onclick="navigate(-1)">← Préc</button>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">Suivant →</button>
      </div>
    </div>

    <div class="tab-panel" id="tab-vocab">
       <p class="section-title">Flashcards (Clique pour retourner)</p>
       <div id="flashcardsGrid" class="cards-grid"></div>
    </div>
    
    <div class="tab-panel" id="tab-context">
      <div class="content-box" id="contextContent"></div>
    </div>
    
    <div class="tab-panel" id="tab-anecdotes">
      <div id="anecdotesContent"></div>
    </div>
  </div>
</div>

<!-- Modal Historique -->
<div id="historyModal" class="modal" onclick="if(event.target===this)toggleHistory()">
  <div class="modal-content glass-panel" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:16px; font-size:20px;">Mes Chansons Enregistrées</h3>
    <div id="historyList">Aucune chanson sauvegardée.</div>
    <button class="btn" style="margin-top:20px; width:100%" onclick="toggleHistory()">Fermer</button>
  </div>
</div>

<script>
let lines=[], currentIndex=0, showAll=false, currentSongData=null;

/* ── API Key ── */
function getKey() { return localStorage.getItem('gemini_key')||''; }
function saveKey() { const k=document.getElementById('keyInput').value.trim(); if(k){localStorage.setItem('gemini_key', k); renderApiBlock();} }
function clearKey() { localStorage.removeItem('gemini_key'); renderApiBlock(); }
function renderApiBlock() {
  const el=document.getElementById('apiBlock');
  const key=getKey();
  if (key) {
    el.innerHTML=`<div class="api-saved glass-panel"><p><span class="dot"></span>API Gemini prête (${key.slice(0,8)}…)</p><button class="btn btn-sm" onclick="clearKey()">Modifier</button></div>`;
  } else {
    el.innerHTML=`<div class="api-setup glass-panel"><h3>Clé API Google Gemini</h3><div class="search-row"><input type="password" id="keyInput" placeholder="Clé AIza..." /><button class="btn btn-primary" onclick="saveKey()">Enregistrer</button></div></div>`;
  }
}

/* ── Main ── */
async function run() {
  const artist=document.getElementById('artistInput').value.trim();
  const title=document.getElementById('titleInput').value.trim();
  const srcLang=document.getElementById('sourceLang').value;
  const tgtLang=document.getElementById('targetLang').value;
  const key=getKey();
  
  if (!artist && !title) return alert('Titre ou artiste requis.');
  if (!key) return alert('Clé API requise.');

  document.getElementById('result').classList.remove('visible');
  document.getElementById('searchBtn').disabled=true;

  try {
    setStatus('<span class="spinner"></span>Recherche des paroles...');
    const ldata = await fetchLyrics(artist, title, key, srcLang);
    
    setStatus('<span class="spinner"></span>Analyse IA en cours (Niveau, Traductions, Vocab)...');
    const analysis = await geminiAnalyse(ldata.lyrics, ldata.artist, ldata.title, key, srcLang, tgtLang);
    
    hideStatus();
    saveToHistory(ldata, analysis);
    renderSong(ldata, analysis);
  } catch(e) {
    setStatus(`<div style="color:#fca5a5; background:rgba(239,68,68,0.1); padding:16px; border-radius:12px;">Erreur: ${e.message}</div>`);
  } finally {
    document.getElementById('searchBtn').disabled=false;
  }
}

async function fetchLyrics(a, t, key, sl) {
  if(!a || !t) {
    const raw = await geminiRaw(`Retrouve l'artiste et le titre de: "${a||t}". JSON: {"artist":"x","title":"y"}`, key);
    const info = parseJSON(raw);
    a = info.artist; t = info.title;
  }
  let lyrics = "";
  try {
    const res = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(a)}/${encodeURIComponent(t)}`);
    if(res.ok) { const d = await res.json(); lyrics = d.lyrics; }
  } catch(e) {}
  
  if(!lyrics) {
    lyrics = await geminiRaw(`Donne-moi UNIQUEMENT les paroles originales complètes (en ${sl}) de la chanson "${t}" par "${a}". N'inclus ni markdown, ni phrases d'intro, juste les lyrics.`, key);
    lyrics = lyrics.replace(/^```[^]*\n/, '').replace(/```$/, '');
  }
  if (!lyrics || lyrics.length < 20) throw new Error("Paroles introuvables même via l'IA.");
  return { artist:a, title:t, lyrics };
}

async function geminiAnalyse(lyrics, artist, title, key, sl, tl) {
  const rawLines = lyrics.split('\\n').map(l=>l.trim()).filter(l=>l.length>0);
  const prompt = `Agis comme un professeur de langues expert. Chanson: "${title}" de ${artist}. Langue originale: ${sl}. Traduction vers: ${tl}.
Paroles :
${rawLines.map((l,i)=>`${i}. ${l}`).join('\\n')}

Renvoie UNIQUEMENT un JSON structuré exactement comme suit (sans backticks ni markdown externes):
{
  "difficulty": "A1, A2, B1, B2, C1 ou C2",
  "lines": [ {"src":"ligne", "tgt":"trad", "note":"explication culturelle/argot (ou null)"} ],
  "context": "Contexte historique/sens de la chanson (3 phrases)",
  "anecdotes": ["anecdote 1", "anecdote 2"],
  "vocab": [ {"src":"mot clé", "tgt":"traduction", "ctx":"ex: In the specific context"} ]
}
Assure-toi d'extraire entre 6 et 10 mots complexes pour le vocabulaire.`;

  return parseJSON(await geminiRaw(prompt, key));
}

async function geminiRaw(prompt, key) {
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
  const res=await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.2, maxOutputTokens:8192} }) });
  const data=await res.json();
  if(!res.ok) throw new Error(data?.error?.message||'Erreur API');
  return data.candidates[0].content.parts[0].text;
}

function parseJSON(raw) {
  raw=raw.trim().replace(/^```(?:json)?/,'').replace(/```$/,'').trim();
  return JSON.parse(raw.slice(raw.indexOf('{'), raw.lastIndexOf('}')+1));
}

/* ── DOM Rendering ── */
function renderSong(ldata, analysis) {
  document.getElementById('stitle').innerHTML = `${esc(ldata.title)} <span class="diff-badge">${esc(analysis.difficulty||'B1')}</span>`;
  document.getElementById('sartist').textContent = "interprété par " + ldata.artist;
  document.getElementById('contextContent').textContent = analysis.context || '';
  document.getElementById('anecdotesContent').innerHTML = (analysis.anecdotes||[]).map(a=>`<div class="content-box">💡 ${esc(a)}</div>`).join('');
  
  // Flashcards
  const v = analysis.vocab||[];
  document.getElementById('flashcardsGrid').innerHTML = v.length ? v.map((w,i)=>`
    <div class="flashcard" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="flashcard-front"><div class="fc-word">${esc(w.src)}</div></div>
        <div class="flashcard-back"><div class="fc-trans">${esc(w.tgt)}</div><div class="fc-ctx">"${esc(w.ctx)}"</div></div>
      </div>
    </div>`).join('') : '<p>Pas de vocabulaire détecté.</p>';

  lines = analysis.lines||[];
  currentIndex=0; showAll=false;
  document.getElementById('showAllToggle').checked = false;
  document.getElementById('trackThumb').style.transform = 'translateX(0)';
  document.getElementById('trackBg').style.background = 'rgba(255,255,255,0.1)';
  
  switchTab('learn', document.querySelector('.tab-btn'));
  renderLines();
  document.getElementById('result').classList.add('visible');
}

function renderLines() {
  const c = document.getElementById('lyricsContainer');
  c.innerHTML='';
  lines.forEach((line,i)=>{
    const done=showAll||i<currentIndex, curr=!showAll&&i===currentIndex;
    const card=document.createElement('div');
    card.className='line-card'+(curr?' current':'')+(done&&!showAll?' done':'');
    card.id='lc'+i;
    card.innerHTML=`
      <div class="line-en" onclick="revealLine(${i})">
        <button class="btn-icon" onclick="playAudio('${esc(line.src).replace(/'/g,"\\'").replace(/"/g,"&quot;")}', event)" title="Écouter">🔊</button>
        <span class="line-text">${esc(line.src)}</span>
      </div>
      <div class="line-fr${showAll||done?' visible':''}" id="fr${i}">
        ${esc(line.tgt)}
        <div class="line-note">
          ${line.note?`<span>💡 ${esc(line.note)}</span>`:''}
          <div><button class="btn-xs" onclick="openDeepDive(${i}, event)">🧠 Deep Dive Grammaire</button></div>
        </div>
        <div class="deep-dive-box" id="dd${i}"></div>
      </div>`;
    c.appendChild(card);
  });
  updateProgress();
}

function revealLine(i) {
  if (showAll || i>currentIndex) { currentIndex=i; renderLines(); }
  else document.getElementById('fr'+i)?.classList.toggle('visible');
}
function navigate(dir) {
  const n=currentIndex+dir;
  if(n>=0 && n<lines.length){ currentIndex=n; renderLines(); document.getElementById('lc'+n).scrollIntoView({behavior:'smooth',block:'center'}); }
}
function toggleShowAll() {
  showAll=document.getElementById('showAllToggle').checked;
  document.getElementById('trackThumb').style.transform = showAll ? 'translateX(20px)' : 'translateX(0)';
  document.getElementById('trackBg').style.background = showAll ? 'var(--accent-grad)' : 'rgba(255,255,255,0.1)';
  renderLines();
}
function updateProgress() {
  doz = Math.min(currentIndex+1, lines.length);
  document.getElementById('progressFill').style.width = lines.length ? (doz/lines.length*100)+'%' : '0';
  document.getElementById('prevBtn').disabled = currentIndex===0;
  document.getElementById('nextBtn').disabled = currentIndex>=lines.length-1;
}
function switchTab(t,b) {
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); document.getElementById('tab-'+t).classList.add('active');
}
function setStatus(html) { document.getElementById('status').innerHTML=html; document.getElementById('status').classList.remove('hidden'); }
function hideStatus() { document.getElementById('status').classList.add('hidden'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── New Features (Audio, DeepDive, History) ── */
function playAudio(text, e) {
  e.stopPropagation();
  const u = new SpeechSynthesisUtterance(text);
  const langMap = {"Anglais":"en-US", "Espagnol":"es-ES", "Coréen":"ko-KR", "Japonais":"ja-JP", "Italien":"it-IT", "Allemand":"de-DE"};
  u.lang = langMap[document.getElementById('sourceLang').value] || 'en-US';
  speechSynthesis.speak(u);
}

async function openDeepDive(i, e) {
  e.stopPropagation();
  const box = document.getElementById('dd'+i);
  if(box.classList.contains('active')) { box.classList.remove('active'); return; }
  box.classList.add('active'); 
  if(box.innerHTML) return; 
  box.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Explication en cours...';
  try {
    const raw = await geminiRaw(`Analyse grammaticale très brève mais pointue de cette ligne de chanson. Ligne: "${lines[i].src}". Traduction: "${lines[i].tgt}". Explique syntaxe ou temps verbal (en français). Concision maximale.`, getKey());
    box.innerHTML = esc(raw).replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--accent)">$1</strong>').replace(/\n/g,'<br>');
  } catch(err) { box.innerHTML = "Erreur: "+err.message; }
}

function saveToHistory(ldata, analysis) {
  let hist = JSON.parse(localStorage.getItem('ll_hist')||'[]');
  const id = ldata.artist + '-' + ldata.title;
  hist = hist.filter(h => h.id!==id);
  hist.unshift({id, ldata, analysis, title:ldata.title, artist:ldata.artist});
  if(hist.length>20) hist.pop();
  localStorage.setItem('ll_hist', JSON.stringify(hist));
}

function toggleHistory() {
  const m = document.getElementById('historyModal');
  m.classList.toggle('active');
  if(m.classList.contains('active')){
    const hist = JSON.parse(localStorage.getItem('ll_hist')||'[]');
    document.getElementById('historyList').innerHTML = hist.length ? hist.map((h,i)=>
      `<div class="hist-item" onclick="loadHist(${i})">
        <div><strong>${esc(h.title)}</strong><br><span style="font-size:12px;color:var(--text2)">${esc(h.artist)}</span></div>
        <span class="diff-badge">${esc(h.analysis.difficulty||'N/A')}</span>
      </div>`).join('') : '<p style="color:var(--text2)">Aucune chanson enregistrée.</p>';
  }
}

function loadHist(index) {
  const hist = JSON.parse(localStorage.getItem('ll_hist')||'[]');
  if(hist[index]) {
    document.getElementById('artistInput').value = hist[index].artist;
    document.getElementById('titleInput').value = hist[index].title;
    toggleHistory();
    renderSong(hist[index].ldata, hist[index].analysis);
  }
}

renderApiBlock();
document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&document.activeElement?.tagName==='INPUT') run(); });
</script>
</body>
</html>
