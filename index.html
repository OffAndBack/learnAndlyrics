<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics & Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --coral:#D85A30; --coral-dark:#993C1D; --coral-light:#FAECE7;
      --green-light:#EAF3DE; --green-dark:#3B6D11;
      --bg:#0f0f10; --bg2:#181819; --bg3:#222224;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#f0ede8; --text2:#a09c96; --text3:#6b6762;
      --radius:10px; --radius-lg:14px;
    }
    html { scroll-behavior: smooth; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; }
    .container { max-width:860px; margin:0 auto; padding:2.5rem 1.5rem 5rem; }

    /* Header */
    header { text-align:center; margin-bottom:2.5rem; }
    .logo { font-family:'Playfair Display',serif; font-size:clamp(28px,5vw,42px); font-weight:700; letter-spacing:-1px; line-height:1; margin-bottom:8px; }
    .logo span { color:var(--coral); }
    .tagline { font-size:13px; color:var(--text2); font-weight:300; }

    /* API block */
    .api-setup { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); padding:1.25rem 1.5rem; margin-bottom:1.5rem; }
    .api-setup h3 { font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }
    .api-saved { display:flex; align-items:center; justify-content:space-between; background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); padding:10px 16px; margin-bottom:1.5rem; }
    .api-saved p { font-size:13px; color:var(--text2); }
    .dot { display:inline-block; width:7px; height:7px; background:#63c477; border-radius:50%; margin-right:8px; }
    .api-note { font-size:12px; color:var(--text3); margin-top:8px; line-height:1.5; }
    .api-note a { color:var(--coral); text-decoration:none; }
    .api-note a:hover { text-decoration:underline; }
    .api-row { display:flex; gap:10px; }

    /* Inputs */
    input[type="text"], input[type="password"] {
      flex:1; width:100%; padding:11px 14px; font-size:14px; font-family:'DM Sans',sans-serif;
      background:var(--bg3); color:var(--text); border:0.5px solid var(--border2);
      border-radius:var(--radius); outline:none; transition:border-color .2s;
    }
    input:focus { border-color:var(--coral); }
    input::placeholder { color:var(--text3); }

    /* Search */
    .search-wrap { margin-bottom:2rem; }
    .search-row { display:flex; gap:10px; margin-bottom:6px; }
    .hint { font-size:12px; color:var(--text3); }

    /* Buttons */
    .btn { padding:11px 20px; font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif; border-radius:var(--radius); cursor:pointer; border:0.5px solid var(--border2); background:transparent; color:var(--text); transition:background .15s,transform .1s; white-space:nowrap; }
    .btn:hover { background:var(--bg3); }
    .btn:active { transform:scale(0.98); }
    .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .btn-primary { background:var(--coral); border-color:var(--coral); color:white; }
    .btn-primary:hover { background:var(--coral-dark); border-color:var(--coral-dark); }
    .btn-sm { padding:6px 12px; font-size:12px; }

    /* Status */
    #status { text-align:center; padding:2rem; font-size:14px; color:var(--text2); }
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--coral); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .step-label { font-size:12px; color:var(--text3); display:block; margin-top:6px; }
    .error-box { background:rgba(220,60,60,.1); border:0.5px solid rgba(220,60,60,.3); border-radius:var(--radius); padding:14px 16px; font-size:14px; color:#f08080; }

    /* Song header */
    #songHeader { display:flex; align-items:center; gap:16px; padding:16px 20px; background:var(--bg2); border-radius:var(--radius-lg); border:0.5px solid var(--border); margin-bottom:1.5rem; }
    .song-icon { width:52px; height:52px; background:var(--coral-light); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
    .song-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; margin-bottom:3px; }
    .song-meta { font-size:13px; color:var(--text2); }

    /* Tabs */
    .tabs { display:flex; gap:2px; border-bottom:0.5px solid var(--border); margin-bottom:1.5rem; }
    .tab-btn { padding:9px 18px; font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif; border:none; background:transparent; cursor:pointer; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-0.5px; transition:color .15s; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--coral); border-bottom-color:var(--coral); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Toggle */
    .mode-row { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text2); margin-bottom:1rem; }
    .toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-track { position:absolute; top:0; left:0; right:0; bottom:0; background:var(--bg3); border:0.5px solid var(--border2); border-radius:20px; cursor:pointer; transition:.2s; }
    .toggle-track::before { content:""; position:absolute; height:14px; width:14px; left:2px; bottom:2px; background:var(--text3); border-radius:50%; transition:.2s; }
    .toggle input:checked + .toggle-track { background:var(--coral); border-color:var(--coral); }
    .toggle input:checked + .toggle-track::before { transform:translateX(16px); background:white; }
    .reveal-hint { font-size:12px; color:var(--text3); margin-bottom:1rem; }

    /* Lines */
    .line-card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); margin-bottom:8px; overflow:hidden; cursor:pointer; transition:border-color .15s; }
    .line-card:hover { border-color:var(--border2); }
    .line-card.current { border-color:var(--coral); }
    .line-card.done { opacity:.6; }
    .line-en { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:15px; font-weight:500; line-height:1.5; }
    .line-text { flex:1; }
    .badge { font-size:11px; font-weight:500; padding:2px 9px; border-radius:20px; flex-shrink:0; }
    .badge-todo    { background:var(--bg3); color:var(--text3); }
    .badge-current { background:var(--coral-light); color:var(--coral-dark); }
    .badge-done    { background:var(--green-light); color:var(--green-dark); }
    .line-fr { display:none; border-top:0.5px solid var(--border); padding:10px 16px 12px; font-size:14px; font-style:italic; color:var(--text2); line-height:1.65; }
    .line-fr.visible { display:block; }
    .line-note { font-style:normal; font-size:12px; color:var(--text3); margin-top:7px; padding-top:7px; border-top:0.5px solid var(--border); }

    /* Controls */
    .controls { display:flex; align-items:center; gap:12px; margin-top:1.5rem; flex-wrap:wrap; }
    .progress-bar { flex:1; height:3px; background:var(--bg3); border-radius:2px; min-width:80px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--coral); border-radius:2px; transition:width .4s ease; }
    .progress-label { font-size:12px; color:var(--text3); white-space:nowrap; }

    /* Context & anecdotes */
    .section-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; margin-bottom:12px; }
    .context-box { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; font-size:14px; line-height:1.8; color:var(--text2); }
    .anecdote { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius); padding:12px 14px 12px 42px; margin-bottom:8px; font-size:14px; line-height:1.65; color:var(--text2); position:relative; }
    .anecdote-num { position:absolute; left:12px; top:12px; width:20px; height:20px; background:var(--coral-light); color:var(--coral-dark); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; }

    .hidden { display:none !important; }
    #result { display:none; }
    #result.visible { display:block; }

    @media (max-width:560px) {
      .api-row, .search-row { flex-direction:column; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Lyrics <span>&</span> Learn</div>
    <p class="tagline">Paroles réelles · Traduction IA · Contexte & anecdotes</p>
  </header>

  <div id="apiBlock"></div>

  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="artistInput" placeholder="Artiste — ex: Queen, Adele, Eminem" />
      <input type="text" id="titleInput"  placeholder="Titre — ex: Bohemian Rhapsody" />
      <button class="btn btn-primary" id="searchBtn" onclick="run()">Analyser ↗</button>
    </div>
    <p class="hint">Remplis au moins un champ. Paroles récupérées via lyrics.ovh (gratuit, sans clé).</p>
  </div>

  <div id="status" class="hidden"></div>

  <div id="result">
    <div id="songHeader"></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('learn',this)">Apprentissage</button>
      <button class="tab-btn" onclick="switchTab('context',this)">Contexte</button>
      <button class="tab-btn" onclick="switchTab('anecdotes',this)">Anecdotes</button>
    </div>
    <div class="tab-panel active" id="tab-learn">
      <div class="mode-row">
        <span>Tout afficher</span>
        <label class="toggle">
          <input type="checkbox" id="showAllToggle" onchange="toggleShowAll()" />
          <span class="toggle-track"></span>
        </label>
      </div>
      <p class="reveal-hint" id="revealHint">Clique sur une ligne pour révéler la traduction</p>
      <div id="lyricsContainer"></div>
      <div class="controls" id="controls">
        <button class="btn" id="prevBtn" onclick="navigate(-1)">← Précédent</button>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-label" id="progressLabel">0 / 0</span>
        <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">Suivant →</button>
      </div>
    </div>
    <div class="tab-panel" id="tab-context">
      <p class="section-title">Contexte de la chanson</p>
      <div class="context-box" id="contextContent"></div>
    </div>
    <div class="tab-panel" id="tab-anecdotes">
      <p class="section-title">Anecdotes & faits marquants</p>
      <div id="anecdotesContent"></div>
    </div>
  </div>

</div>
<script>
let lines=[], currentIndex=0, showAll=false;

/* ── API Key ── */
function getKey() { return localStorage.getItem('gemini_key')||''; }
function saveKey() {
  const k=document.getElementById('keyInput').value.trim();
  if (!k) return;
  localStorage.setItem('gemini_key', k);
  renderApiBlock();
}
function clearKey() { localStorage.removeItem('gemini_key'); renderApiBlock(); }
function renderApiBlock() {
  const el=document.getElementById('apiBlock');
  const key=getKey();
  if (key) {
    el.innerHTML=`<div class="api-saved">
      <p><span class="dot"></span>Clé Gemini configurée (${key.slice(0,12)}…)</p>
      <button class="btn btn-sm" onclick="clearKey()">Modifier</button>
    </div>`;
  } else {
    el.innerHTML=`<div class="api-setup">
      <h3>Clé API Google Gemini — gratuite</h3>
      <div class="api-row">
        <input type="password" id="keyInput" placeholder="AIza..." />
        <button class="btn btn-primary" onclick="saveKey()">Sauvegarder</button>
      </div>
      <p class="api-note">Clé 100% gratuite sur <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> — stockée uniquement dans ton navigateur.</p>
    </div>`;
  }
}

/* ── Main ── */
async function run() {
  const artist=document.getElementById('artistInput').value.trim();
  const title=document.getElementById('titleInput').value.trim();
  if (!artist && !title) { alert('Remplis au moins le titre ou l\'artiste.'); return; }
  const key=getKey();
  if (!key) { alert('Configure ta clé Gemini d\'abord.'); return; }

  document.getElementById('result').classList.remove('visible');
  document.getElementById('searchBtn').disabled=true;

  try {
    setStatus('<span class="spinner"></span>Récupération des paroles…<span class="step-label">lyrics.ovh</span>');
    const ldata=await fetchLyrics(artist, title, key);

    setStatus('<span class="spinner"></span>Traduction & analyse IA…<span class="step-label">Gemini 2.0 Flash</span>');
    const analysis=await geminiAnalyse(ldata.lyrics, ldata.artist, ldata.title, key);

    hideStatus();
    renderSong(ldata, analysis);
  } catch(e) {
    showError(e.message);
  } finally {
    document.getElementById('searchBtn').disabled=false;
  }
}

/* ── Lyrics.ovh ── */
async function fetchLyrics(artist, title, key) {
  let a=artist, t=title;

  // Si un seul champ rempli, demander à Gemini d'identifier la chanson
  if (!a || !t) {
    const query=a||t;
    const prompt=`Identifie la chanson anglophone la plus connue correspondant à : "${query}".
Réponds UNIQUEMENT en JSON valide sans backticks :
{"artist":"nom exact","title":"titre exact"}`;
    const raw=await geminiRaw(prompt, key);
    const info=parseJSON(raw);
    a=info.artist; t=info.title;
  }

  const url=`https://api.lyrics.ovh/v1/${encodeURIComponent(a)}/${encodeURIComponent(t)}`;
  const res=await fetch(url);
  if (!res.ok) throw new Error(`Paroles introuvables pour "${t}" de ${a}. Vérifie l'orthographe (en anglais).`);
  const data=await res.json();
  if (!data.lyrics) throw new Error('Pas de paroles disponibles pour cette chanson.');
  return { lyrics:data.lyrics, artist:a, title:t };
}

/* ── Gemini ── */
async function geminiAnalyse(lyrics, artist, title, key) {
  const rawLines=lyrics.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const prompt=`Tu es expert en musicologie et traduction didactique.

Chanson : "${title}" — ${artist}

Paroles (ligne par ligne) :
${rawLines.map((l,i)=>`${i+1}. ${l}`).join('\n')}

Réponds UNIQUEMENT en JSON valide sans backticks :
{
  "lines": [
    {"en":"ligne originale exacte","fr":"traduction française naturelle","note":"explication argot/figure/référence ou null"}
  ],
  "context": "5 à 7 phrases : contexte historique, album, thèmes, impact culturel.",
  "anecdotes": ["anecdote 1","anecdote 2","anecdote 3","anecdote 4","anecdote 5"]
}

Règles : traduire chaque ligne dans l'ordre. Si un refrain se répète à l'identique, le traduire une fois avec note "[Refrain, répété]". Notes : argot, double sens, références culturelles — sinon null.`;

  const raw=await geminiRaw(prompt, key);
  return parseJSON(raw);
}

async function geminiRaw(prompt, key) {
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
  const res=await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.4, maxOutputTokens:8192}
    })
  });
  if (!res.ok) {
    const err=await res.json().catch(()=>({}));
    throw new Error(err?.error?.message||`Erreur Gemini HTTP ${res.status}`);
  }
  const data=await res.json();
  const text=data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Réponse Gemini vide. Réessaie.');
  return text;
}

function parseJSON(raw) {
  raw=raw.trim().replace(/^```(?:json)?/,'').replace(/```$/,'').trim();
  const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
  if (s!==-1&&e!==-1) raw=raw.slice(s,e+1);
  return JSON.parse(raw);
}

/* ── Render ── */
function renderSong(ldata, analysis) {
  document.getElementById('songHeader').innerHTML=`
    <div class="song-icon">♪</div>
    <div>
      <div class="song-title">${esc(ldata.title)}</div>
      <div class="song-meta">${esc(ldata.artist)}</div>
    </div>`;

  lines=analysis.lines||[];
  currentIndex=0; showAll=false;
  document.getElementById('showAllToggle').checked=false;
  document.getElementById('revealHint').style.display='';
  document.getElementById('controls').style.display='';
  renderLines();

  document.getElementById('contextContent').textContent=analysis.context||'';
  document.getElementById('anecdotesContent').innerHTML=(analysis.anecdotes||[])
    .map((a,i)=>`<div class="anecdote"><div class="anecdote-num">${i+1}</div>${esc(a)}</div>`)
    .join('');

  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('result').classList.add('visible');
}

function renderLines() {
  const c=document.getElementById('lyricsContainer');
  c.innerHTML='';
  lines.forEach((line,i)=>{
    const done=showAll||i<currentIndex;
    const curr=!showAll&&i===currentIndex;
    const badge=done?'badge-done':curr?'badge-current':'badge-todo';
    const label=done?'✓':curr?'→':i+1;
    const card=document.createElement('div');
    card.className='line-card'+(curr?' current':'')+(done&&!showAll?' done':'');
    card.id='lc'+i;
    card.innerHTML=`
      <div class="line-en">
        <span class="line-text">${esc(line.en)}</span>
        <span class="badge ${badge}">${label}</span>
      </div>
      <div class="line-fr${showAll||done?' visible':''}" id="fr${i}">
        ${esc(line.fr)}
        ${line.note?`<div class="line-note">💡 ${esc(line.note)}</div>`:''}
      </div>`;
    card.onclick=()=>revealLine(i);
    c.appendChild(card);
  });
  updateProgress();
}

function revealLine(i) {
  if (showAll) return;
  if (i>currentIndex) { currentIndex=i; renderLines(); return; }
  document.getElementById('fr'+i)?.classList.toggle('visible');
}

function navigate(dir) {
  const n=currentIndex+dir;
  if (n<0||n>=lines.length) return;
  currentIndex=n;
  renderLines();
  document.getElementById('lc'+currentIndex)?.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleShowAll() {
  showAll=document.getElementById('showAllToggle').checked;
  document.getElementById('revealHint').style.display=showAll?'none':'';
  document.getElementById('controls').style.display=showAll?'none':'';
  renderLines();
}

function updateProgress() {
  const total=lines.length, done=Math.min(currentIndex+1,total);
  document.getElementById('progressFill').style.width=total?(done/total*100)+'%':'0';
  document.getElementById('progressLabel').textContent=done+' / '+total;
  document.getElementById('prevBtn').disabled=currentIndex===0;
  document.getElementById('nextBtn').disabled=currentIndex>=lines.length-1;
}

function switchTab(name,btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function setStatus(html) {
  const el=document.getElementById('status');
  el.innerHTML=html; el.classList.remove('hidden');
}
function hideStatus() { document.getElementById('status').classList.add('hidden'); }
function showError(msg) { setStatus(`<div class="error-box"><strong>Erreur :</strong> ${esc(msg)}</div>`); }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderApiBlock();
document.addEventListener('keydown', e=>{
  if (e.key==='Enter'&&document.activeElement?.tagName==='INPUT') run();
});
</script>
</body>
</html>
